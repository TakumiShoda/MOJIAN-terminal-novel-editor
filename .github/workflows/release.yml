name: Release

# 打个 `v*` 标签就发一版；也可手动触发只为验证四平台的 release 构建能过。
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # 建 Release、传附件要写权限

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # 一律用**原生** runner 编译，不做交叉编译——本项目依赖 sqlite/zstd/blake3
        # 三个 C 库，交叉编译要各平台的 C 工具链，踩过坑不趟第二遍。
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-13 # Intel runner
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest # Apple Silicon runner
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # --locked：按 Cargo.lock 复现构建，发布版本不该被上游随手更新带偏。
      - name: build
        run: cargo build --release --locked --bin mj --target ${{ matrix.target }}

      # 版本号取自标签（refs/tags/v0.1.0 → v0.1.0）；手动触发时退回 dev。
      - name: 定版本名
        id: name
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            ver="${GITHUB_REF#refs/tags/}"
          else
            ver="dev-${GITHUB_SHA::7}"
          fi
          echo "stem=mj-${ver}-${{ matrix.target }}" >> "$GITHUB_OUTPUT"

      - name: 打包（unix）
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          stem="${{ steps.name.outputs.stem }}"
          mkdir "$stem"
          cp "target/${{ matrix.target }}/release/mj" "$stem/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$stem/"
          tar czf "$stem.tar.gz" "$stem"

      - name: 打包（windows）
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          stem="${{ steps.name.outputs.stem }}"
          mkdir "$stem"
          cp "target/${{ matrix.target }}/release/mj.exe" "$stem/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$stem/"
          7z a "$stem.zip" "$stem"

      # 手动触发也留个可下载的产物，好验证「构建出来的东西真能跑」。
      - name: 上传到工作流产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name.outputs.stem }}
          path: |
            ${{ steps.name.outputs.stem }}.tar.gz
            ${{ steps.name.outputs.stem }}.zip
          if-no-files-found: ignore

      # 只有打标签才真发 Release。
      - name: 附到 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.name.outputs.stem }}.tar.gz
            ${{ steps.name.outputs.stem }}.zip
          fail_on_unmatched_files: false
          body: |
            四平台预编译二进制。下载对应你系统的那个，解开就是 `mj`。

            - macOS / Linux：`tar xzf mj-*.tar.gz`，把里面的 `mj` 放进 `PATH`
            - Windows：解压 zip，运行 `mj.exe`

            ⚠️ 二进制**未签名**：macOS 首次运行可能提示「已损坏」，
            用 `xattr -d com.apple.quarantine ./mj` 解除隔离；
            Windows 会弹 SmartScreen，选「仍要运行」。

            先跑一句 `mj doctor` 看看你的终端能力，再 `mj` 进书架。
